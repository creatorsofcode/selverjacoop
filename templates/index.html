<!DOCTYPE html>
<html>
<head>
    <title>Selver vs Coop</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Selver vs Coop</h1>
    <form method="GET" action="/search">
        <input type="text" name="q" placeholder="Otsi toodet..." value="sai">
        <button type="submit">Otsi</button>
    </form>
    
    <h3>Alternatiiv - POST päringuga</h3>
    <button onclick="postSearch()">POST päring</button>
    
    <script>
        function postSearch() {
            fetch('/search', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({q: 'sai'})
            })
            .then(response => response.json())
            .then(data => {
                console.log(data);
                alert('Vaata konsooli!');
            });
        }
    </script>
</body>
</html>
